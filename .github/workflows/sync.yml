name: Sync to port2 repo

on:
  push:
    branches:
      - dev

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to port2 repo
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "sync@bot.com"

          # Remove the .github directory from the local commit history so it isn't pushed to the target
          git rm -rf .github
          git commit -m "Auto-sync without .github workflows"

          # Add target repo as remote
          git remote add target https://${{ secrets.PORT_REPO_TOKEN }}@github.com/shivsh01/port2.git

          # Push the modified dev branch directly
          git push target HEAD:dev --force